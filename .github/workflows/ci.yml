name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  deadcode:
    name: Dead code (knip)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Node >=22 is required since the AppFramework's engines bump (QR
          # payload benchmark, decision D3): CompressionStream('deflate-raw')
          # only exists from Node 21.2. 24 matches publish.yml and local dev.
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Whole-workspace knip pass. Runs as its own job so dead-code
      # enforcement is independent of the test suite (no framework build, no
      # Playwright browsers) and a finding is attributed to this step rather
      # than masquerading as a Starter test failure.
      - name: Check for dead code
        run: pnpm run check:deadcode

  test:
    name: Test (all workspaces)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Node >=22 is required since the AppFramework's engines bump (QR
          # payload benchmark, decision D3): CompressionStream('deflate-raw')
          # only exists from Node 21.2. 24 matches publish.yml and local dev.
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Recorder + example resolve `gps-plus-slam-app-framework` via the
      # package's `exports` -> `./dist/...`, so the framework must be built
      # before its consumers run their tests.
      - name: Build AppFramework
        run: pnpm run build:framework

      - name: Install Playwright browsers
        working-directory: GpsPlusSlamJs_RecorderApp
        run: pnpm exec playwright install --with-deps chromium

      # Root `pnpm test` runs: repo-config + framework + recorder (core + e2e)
      # + anchor-starter + minimal example. This is the single source of truth,
      # matching the command developers run locally. (knip also runs here
      # transitively via the starter gate, but the dedicated `deadcode` job
      # above is the authoritative gate.)
      - name: Run full test suite
        run: pnpm test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: GpsPlusSlamJs_RecorderApp/test-results/
          retention-days: 14
