name: Publish AppFramework to npm

# Publishes `gps-plus-slam-app-framework` to the npm registry whenever a
# GitHub Release is published on this (public) repository. Mirrors the
# private repo's `gps-plus-slam-js` publish workflow but without the
# K5/R8 community-key re-signing step (AppFramework has no embedded key).
#
# Background: GpsPlusSlamJs_Docs/docs/2026-03-30-separate-public-repo-plan.md
# §10.3 (Phase F) in the private repo.
#
# Authentication: npm Trusted Publishing (OIDC). No long-lived NPM_TOKEN
# secret. The Trusted Publisher must be registered on npmjs.com →
# gps-plus-slam-app-framework → Settings → Trusted Publishers with
# provider=GitHub Actions, owner=cs-util-com, repo=location-based-webxr,
# workflow=publish.yml (Phase F task F4).
#
# Tag scheme: this workflow only fires for releases whose tag starts with
# `app-framework@` (e.g. `app-framework@1.0.0`). Future RecorderApp or
# other workspace-package releases use distinct tag prefixes so a single
# repo can host multiple independent release streams without ambiguity.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm provenance + Trusted Publishing OIDC

jobs:
  publish:
    # Only run for AppFramework releases. Other release tags (e.g. for
    # RecorderApp deployments) fall through to a no-op.
    if: startsWith(github.event.release.tag_name, 'app-framework@')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # Check out the exact tagged commit so a later push to main cannot
          # change what gets published.
          ref: ${{ github.event.release.tag_name }}

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Node 24 is the current Active LTS, matching local dev and the
          # pnpm 11 floor (Node ≥22.14). See the matching note in the
          # private repo's publish.yml.
          node-version: "24"
          cache: "pnpm"
          # Even with Trusted Publishing (no token), the registry-url line
          # in .npmrc is still required so pnpm targets the public registry.
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json version
        # Two-version model: package.json#version is the source of truth
        # shipped to npm; the GitHub release tag is metadata. Abort fast if
        # they disagree so a typo in the GitHub UI cannot ship.
        working-directory: GpsPlusSlamJs_AppFramework
        run: |
          PKG_VERSION="app-framework@$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${{ github.event.release.tag_name }}" ]; then
            echo "::error::Release tag ${{ github.event.release.tag_name }} does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: pnpm install --frozen-lockfile

      # ──────────────────────────────────────────────────────────────────
      # Trusted-Publishing diagnostic step. Prints the GitHub OIDC claims
      # that npm uses to authorize the publish, plus the Trusted Publisher
      # list npm has actually saved for `gps-plus-slam-app-framework`.
      # Runs before the real publish so the failed `Publish AppFramework`
      # log captures both sides of any mismatch. Mirrors the identical
      # step in the private repo's publish.yml — see
      # `GpsPlusSlamJs_Docs/docs_guides/npm-publish-guide.md` §3.3 there.
      #
      # Why this lives here: the npm registry's failure mode for an OIDC
      # authorization mismatch is the misleading
      #   `404 Not Found - PUT https://registry.npmjs.org/<name>`
      # — not a 401/403. The step is read-only and never blocks.
      - name: Trusted-Publishing diagnostic (read-only)
        if: always()
        working-directory: GpsPlusSlamJs_AppFramework
        env:
          ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
        run: |
          echo "::group::GitHub OIDC claims that will be presented to npm"
          # Request an OIDC token with the npm audience and decode its
          # payload (claims). This is exactly the token `pnpm publish`
          # exchanges for an npm credential, so the values printed here
          # are byte-for-byte what npm matches against the registered
          # Trusted Publisher entry.
          ID_TOKEN_RESPONSE=$(curl -sSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org")
          ID_TOKEN=$(echo "$ID_TOKEN_RESPONSE" | node -e 'process.stdin.on("data",d=>{try{process.stdout.write(JSON.parse(d).value||"")}catch(e){}})')
          if [ -z "$ID_TOKEN" ]; then
            echo "::warning::Could not obtain OIDC token. Response: $ID_TOKEN_RESPONSE"
          else
            # Decode the payload (middle segment of the JWT)
            echo "$ID_TOKEN" | awk -F. '{print $2}' | base64 -d 2>/dev/null \
              | node -e 'let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>{try{const c=JSON.parse(d);for(const k of ["iss","aud","sub","repository","repository_owner","repository_id","repository_owner_id","workflow","workflow_ref","workflow_sha","job_workflow_ref","ref","ref_type","sha","environment","event_name","run_id","actor"]){if(k in c)console.log(`  ${k}: ${JSON.stringify(c[k])}`)}}catch(e){console.log("  (failed to parse)",e.message)}})'
          fi
          echo "::endgroup::"

          echo "::group::Trusted Publisher entries npm has saved for gps-plus-slam-app-framework"
          # Public registry endpoint — no auth needed, no Cloudflare gate
          # (this is the API path, not the Cloudflare-gated web UI).
          curl -sSL "https://registry.npmjs.org/-/package/gps-plus-slam-app-framework/access" \
            | node -e 'let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>{try{console.log(JSON.stringify(JSON.parse(d),null,2))}catch(e){console.log(d)}})' \
            || echo "  (endpoint not reachable or not JSON)"
          echo "::endgroup::"

          echo "::group::What to compare"
          echo "  Match these against the entries above:"
          echo "    Owner:          cs-util-com  (OIDC: repository_owner)"
          echo "    Repo:           location-based-webxr  (OIDC: repository, after the slash)"
          echo "    Workflow:       publish.yml  (OIDC: workflow / workflow_ref filename)"
          echo "    Environment:    (blank)      (OIDC: environment - must be absent or empty)"
          echo "::endgroup::"

      - name: Publish AppFramework
        working-directory: GpsPlusSlamJs_AppFramework
        # `pnpm publish` implements the npm Trusted Publishing OIDC token
        # exchange natively since pnpm 11 (pnpm#9812; the early-11
        # GitHub-Actions regression pnpm#11513 was fixed well before
        # 11.10.0). The pnpm-10-era detour via the npm CLI — and with it
        # the npm@11 pin that guarded against npm 12.0.0's broken publish
        # — is gone: the npm CLI is no longer involved anywhere in the
        # release path.
        #
        # `prepublishOnly` (`build` + `verify:pack` +
        # `verify:community-key-lifetime`) runs automatically inside
        # `pnpm publish`.
        #
        # No NODE_AUTH_TOKEN: the id-token write permission above + the
        # publisher registration on npmjs.com authorize this publish.
        #
        # `--no-git-checks`: the CI checkout is in detached-HEAD state.
        #
        # `--provenance` is intentionally omitted: with Trusted Publishing
        # the registry generates provenance attestations automatically.
        #
        # Pre-releases land on the `next` dist-tag so `pnpm install
        # gps-plus-slam-app-framework` keeps installing the GA `latest`.
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            pnpm publish --access public --no-git-checks --tag next
          else
            pnpm publish --access public --no-git-checks
          fi
